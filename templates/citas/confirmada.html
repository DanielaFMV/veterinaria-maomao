{% extends 'citas/base.html' %}

{% block title %}Cita confirmada — Veterinaria Maomao{% endblock %}

{% block content %}
<div class="text-center py-5">
    <div style="font-size: 4rem;">✅</div>
    <h2 class="mt-3">¡Cita confirmada!</h2>
    <p class="lead text-muted">Nos vemos pronto, {{ cita.nombre }}.</p>
    <div class="card shadow-sm mx-auto mt-4 p-4" style="max-width: 400px; background-color: #e8f5f0;">
        <p><strong>Servicio:</strong> {{ cita.servicio }}</p>
        <p><strong>Fecha:</strong> {{ cita.fecha }}</p>
        <p><strong>Hora:</strong> {{ cita.hora }}</p>
    </div>
    <a href="{% url 'citas:inicio' %}" class="btn btn-primary mt-4">Volver al inicio</a>
</div>
{% endblock %}
