{% extends 'citas/base.html' %}

{% block title %}Agendar hora — Veterinaria Maomao{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm p-5" style="background-color: #e8f5f0;">
            <h2 class="text-center mb-4">Agendar una hora</h2>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                    <div class="text-danger small">{{ field.errors }}</div>
                    {% endif %}
                </div>
                {% endfor %}
                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-primary px-5">Solicitar hora</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
