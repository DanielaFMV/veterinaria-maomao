<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Veterinaria Maomao{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f5f0e8;
            font-family: 'Segoe UI', sans-serif;
        }
        .navbar {
            background-color: #4a7c6f !important;
        }
        .navbar-brand, .nav-link {
            color: #f5f0e8 !important;
        }
        .nav-link:hover {
            color: #b8d8c8 !important;
        }
        .btn-primary {
            background-color: #6ab0a0;
            border-color: #6ab0a0;
        }
        .btn-primary:hover {
            background-color: #4a7c6f;
            border-color: #4a7c6f;
        }
        h1, h2, h3 {
            color: #4a7c6f;
        }
        .card {
            border: none;
            border-radius: 16px;
        }
        footer {
            background-color: #4a7c6f;
            color: #f5f0e8;
            text-align: center;
            padding: 20px;
            margin-top: 60px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'citas:inicio' %}">🐾 Veterinaria Maomao</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'citas:inicio' %}">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'citas:agendar' %}">Agendar Hora</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'citas:lista_citas' %}">Citas</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <p>© 2026 Veterinaria Maomao — Cuidamos a tus compañeros 🐾</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
